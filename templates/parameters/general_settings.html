{% extends 'base.html' %}
{% block title %}Genel Ayarlar{% endblock %}
{% block content %}
<div class="page-header">
    <h4><i class="bi bi-gear-fill me-2"></i>Genel Ayarlar</h4>
</div>
<div class="form-container" style="max-width: 600px;">
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="row mb-3 align-items-center">
            <div class="col-md-7">
                <label class="form-label mb-0">{{ field.label }}</label>
            </div>
            <div class="col-md-5">
                {{ field }}
            </div>
        </div>
        {% endfor %}
        <hr>
        <div class="text-end">
            <button type="submit" class="btn btn-success">
                <i class="bi bi-check-lg me-1"></i>Kaydet
            </button>
        </div>
    </form>
</div>
{% endblock %}
