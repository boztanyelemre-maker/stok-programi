{% extends 'base.html' %}
{% block title %}Kisisel Bilgiler{% endblock %}
{% block content %}
<div class="page-header">
    <h4><i class="bi bi-person-circle me-2"></i>Kisisel Bilgiler</h4>
    <a href="{% url 'change_password' %}" class="btn btn-warning btn-sm">
        <i class="bi bi-key me-1"></i>Sifre Degistir
    </a>
</div>
<div class="form-container">
    <form method="post">
        {% csrf_token %}
        <div class="row">
            {% for field in form %}
            <div class="col-md-6 mb-3">
                <label class="form-label">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}<div class="text-danger small">{{ field.errors.0 }}</div>{% endif %}
            </div>
            {% endfor %}
        </div>
        <div class="text-end mt-3">
            <button type="button" class="btn btn-danger me-2" onclick="location.reload()">Iptal</button>
            <button type="submit" class="btn btn-success">Guncelle</button>
        </div>
    </form>
</div>
{% endblock %}
