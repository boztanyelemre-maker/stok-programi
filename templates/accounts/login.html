{% load static %}
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giris - Naron Stok Yonetim</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="text-center mb-4">
                <i class="bi bi-shield-fill-check" style="font-size: 48px; color: #1e2a3a;"></i>
                <h3 class="mt-2">Tav Gard Guvenlik A.S.</h3>
                <p class="text-muted">Stok Yonetim Sistemi</p>
            </div>
            {% if form.errors %}
            <div class="alert alert-danger">Kullanici adi veya sifre hatali.</div>
            {% endif %}
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Kullanici Adi</label>
                    {{ form.username }}
                </div>
                <div class="mb-3">
                    <label class="form-label">Sifre</label>
                    {{ form.password }}
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Giris Yap
                </button>
            </form>
        </div>
    </div>
</body>
</html>
