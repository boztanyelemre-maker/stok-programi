{% extends 'base.html' %}
{% block title %}Sifre Degistir{% endblock %}
{% block content %}
<div class="page-header">
    <h4><i class="bi bi-key me-2"></i>Sifre Degistir</h4>
</div>
<div class="form-container" style="max-width: 500px;">
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-3">
            <label class="form-label">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<div class="text-danger small">{{ field.errors.0 }}</div>{% endif %}
        </div>
        {% endfor %}
        <div class="d-flex gap-2">
            <button type="reset" class="btn btn-warning">Temizle</button>
            <button type="submit" class="btn btn-success">Kaydet</button>
        </div>
    </form>
</div>
{% endblock %}
