# Render Blueprint — Stok / Naron Django
#
# Sizin yapmanız gerekenler (tarayıcı + Git):
# 1) Bu projeyi GitHub veya GitLab'a push edin (render.yaml repo kökünde olsun).
# 2) Render Dashboard → New → Blueprint → aynı repoyu seçin → Apply.
# 3) İlk deploy bitince URL: https://<servis-adı>.onrender.com
# 4) Admin (Shell ucretsiz planda yok): Environment'a BOOTSTRAP_SUPERUSER_USERNAME,
#    BOOTSTRAP_SUPERUSER_PASSWORD, BOOTSTRAP_SUPERUSER_EMAIL ekleyin; redeploy.
#    Sonra bu env satirlarini kaldirin (guvenlik).
#
# Not: Ücretsiz PostgreSQL test amaçlıdır (süre/kota sınırları olabilir).
# Medya yüklemeleri (MEDIA) ücretsiz diskte kalıcı değildir; kalıcı medya için S3 vb. eklenmelidir.

services:
  - type: web
    name: naron-stok
    runtime: python
    plan: free
    region: frankfurt
    # Ucretsiz planda preDeployCommand yok; migrate build sirasinda calisir.
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput
    startCommand: python manage.py ensure_superuser && gunicorn naron.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: naron-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com,localhost,127.0.0.1

databases:
  - name: naron-db
    plan: free
    region: frankfurt
    databaseName: naron
    user: naron
