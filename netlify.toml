# Site: https://curious-dragon-8145c4.netlify.app/
# Netlify → Site settings → Environment variables:
#   CSRF_TRUSTED_ORIGINS = https://curious-dragon-8145c4.netlify.app
#   DATABASE_URL = postgresql://... (Neon / Supabase vb.)
#   DJANGO_SECRET_KEY = güçlü rastgele anahtar
#
# Sürükleyip bırak deploy build çalıştırmaz — Git repo bağlayın veya CLI ile deploy edin.

[build]
  command = "python -m pip install --upgrade pip && python -m pip install -r requirements.txt && python manage.py collectstatic --noinput --settings=naron.settings_netlify && if [ -n \"$DATABASE_URL\" ]; then python manage.py migrate --noinput --settings=naron.settings_netlify; fi && python scripts/netlify_prep.py"
  publish = "staticfiles"
  functions = "netlify/functions"

[build.environment]
  PYTHON_VERSION = "3.12"

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/django"
  status = 200
